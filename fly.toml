app = "product-analyzer-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.api"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  SOURCE_DB_PATH = "/data/source.db"
  METADATA_DB_PATH = "/data/metadata.db"

[mounts]
  source = "product_analyzer_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
